; HotWire — Main configuration file
;
; Copy this to hotwire.ini and edit for your environment.

[general]

; ---- Operating mode ----
; EvseMode: act as a charging station (attacks: EVCCID harvest, forced discharge)
; PevMode : act as an electric vehicle (attacks: impersonation / EVCCID replay)
; ListenMode: passive sniffer
; Can be overridden by CLI arg.
mode = EvseMode

; ---- Simulation (no real hardware) ----
; When enabled, SLAC/SDP/TCP all run over loopback so two processes on one machine can talk.
; Two processes (evse + pev) can run together for end-to-end validation without a PLC modem.
is_simulation_without_modems = false

; ---- Protocol ----
; Which protocol(s) HotWire will negotiate during supportedAppProtocol handshake.
; Values: din_only, iso15118_2_only, prefer_din, prefer_iso
protocol_preference = prefer_din

; ---- PLC hardware (ignored in simulation mode) ----
; Linux: ethernet interface name (e.g. eth0)
eth_interface = eth0
; Windows: full pcap interface device path
eth_windows_interface_name = \Device\NPF_{4C95DA23-E78D-4555-8861-C0F158E9F74E}

; ---- EVSE behaviour ----
; Simulate precharge voltage ramp instead of reading from hardware ADC.
evse_simulate_precharge = yes

; ---- PEV behaviour ----
; End precharge based on EVSEPresentVoltage reported by EVSE (yes) or physical inlet (no).
use_evsepresentvoltage_for_precharge_end = yes
use_physical_inlet_voltage_during_chargeloop = no
u_delta_max_for_end_of_precharge = 10

; Light-bulb demo: PEV-side — delay relay close so voltage stabilizes before load connected.
light_bulb_demo = yes
; Simulate a rising SOC while charging.
soc_simulation = yes

; ---- Hardware interface devices (ignored in simulation) ----
digital_output_device = dieter
analog_input_device = none
serial_port = auto
serial_baud = 19200

; ---- Attack / session params ----
charge_target_voltage = 220
exit_on_session_end = True
exit_if_no_local_link_address_is_found = True
log_the_evse_mac_to_file = True
allow_new_session_after_stopping = False

; ---- Networking ----
; DIN 70121 §8.7.2 does NOT mandate any particular port; both peers pick
; one from the IANA dynamic range (49152-65535) and advertise it via SDP.
; Set `tcp_port_use_well_known = Yes` to force port 15118 (matching the
; ISO standard's name), or specify any port via `tcp_port_alternative`.
tcp_port_use_well_known = No
tcp_port_alternative = 57122

; Deprecated alias of `tcp_port_use_well_known` — kept for backwards
; compatibility with older HotWire installs and pyPLC.
tcp_port_15118_compliant = No

; ---- Testing / fault injection ----
testsuite_enable = No

; ---- Logging ----
udp_syslog_enable = No
logging_url = http://localhost/hotwireLogging/addLog.php

; ---- SoC callback (optional REST hook) ----
soc_callback_enabled = False
soc_callback_endpoint = http://1.1.1.1
soc_fallback_energy_capacity = 2700
soc_fallback_energy_capacity_wh = 64000

; ---- Misc ----
charge_parameter_backend = none
